syntax = "proto3";

package syncflow;

// Version vector for causality tracking
message VersionVector {
  map<string, int64> clock = 1;
}

// File metadata for sync index
message FileMetadata {
  string path = 1;
  int64 size = 2;
  int64 modified_time = 3;
  string hash = 4;
  bool is_deleted = 5;
  VersionVector version = 6;
}

// Chunk information for delta sync
message ChunkInfo {
  int32 index = 1;
  string hash = 2;
  int32 size = 3;
}

// File chunks for transfer
message FileChunks {
  string file_path = 1;
  repeated ChunkInfo chunks = 2;
  int64 total_size = 3;
}

// Sync request from peer
message SyncRequest {
  string device_id = 1;
  string device_name = 2;
  repeated string folder_ids = 3;
  VersionVector last_version = 4;
}

// Sync response with file metadata
message SyncResponse {
  string device_id = 1;
  repeated FileMetadata files = 2;
  VersionVector current_version = 3;
  bool has_more = 4;
}

// Peer device information
message PeerDevice {
  string device_id = 1;
  string device_name = 2;
  string public_key = 3;
  bool is_trusted = 4;
}

// File transfer request
message TransferRequest {
  string file_path = 1;
  repeated int32 chunk_indices = 2;
  string from_device = 3;
}

// File transfer data
message TransferData {
  string file_path = 1;
  int32 chunk_index = 2;
  bytes data = 3;
  string checksum = 4;
}

// Conflict resolution
message Conflict {
  string file_path = 1;
  VersionVector local_version = 2;
  VersionVector remote_version = 3;
  string resolution_strategy = 4;
}

// Configuration message
message SyncConfig {
  string device_id = 1;
  string device_name = 2;
  int32 listen_port = 3;
  bool enable_discovery = 4;
  string relay_server = 5;
  int64 sync_interval_ms = 6;
}
